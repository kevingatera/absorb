name: Homelab Signed Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.7.22-homelab.20260301.2)"
        required: true
        type: string
      release_name:
        description: Release title (defaults to tag)
        required: false
        type: string
      release_notes:
        description: Release notes markdown
        required: false
        type: string
      run_analyze:
        description: Run flutter analyze before build
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: "21"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore Android signing keystore
        shell: bash
        run: |
          mkdir -p android
          echo "${{ secrets.HOMELAB_ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/homelab-signing.jks

      - name: Write key.properties
        shell: bash
        run: |
          printf '%s\n' "storePassword=${{ secrets.HOMELAB_ANDROID_STORE_PASSWORD }}" > android/key.properties
          printf '%s\n' "keyPassword=${{ secrets.HOMELAB_ANDROID_KEY_PASSWORD }}" >> android/key.properties
          printf '%s\n' "keyAlias=${{ secrets.HOMELAB_ANDROID_KEY_ALIAS }}" >> android/key.properties
          printf '%s\n' "storeFile=../homelab-signing.jks" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        if: ${{ inputs.run_analyze }}
        run: flutter analyze

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk "release-artifacts/absorb-${{ inputs.tag }}-signed.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: homelab-signed-apk
          path: release-artifacts/absorb-${{ inputs.tag }}-signed.apk
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    environment: homelab-release
    steps:
      - name: Download signed artifact
        uses: actions/download-artifact@v4
        with:
          name: homelab-signed-apk
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        shell: bash
        run: |
          set -euo pipefail
          ASSET="release-artifacts/absorb-${TAG}-signed.apk"
          NAME="${RELEASE_NAME:-$TAG}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --repo "$REPO" --clobber
            if [ -n "${RELEASE_NOTES}" ]; then
              gh release edit "$TAG" --repo "$REPO" --title "$NAME" --notes "$RELEASE_NOTES"
            else
              gh release edit "$TAG" --repo "$REPO" --title "$NAME"
            fi
          else
            gh release create "$TAG" "$ASSET" --repo "$REPO" --target "homelab" --title "$NAME" --notes "${RELEASE_NOTES:-Homelab signed release build.}"
          fi
