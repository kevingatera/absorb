workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - absorb_keystore
      groups:
        - github_credentials
      flutter: stable
      java: 17
    scripts:
      - name: Build GitHub APK
        script: flutter build apk --release --flavor github --dart-define=GITHUB_BUILD=true
      - name: Build Play Store AAB
        script: flutter build appbundle --release --flavor playstore --dart-define=PLAYSTORE_BUILD=true
      - name: Publish to GitHub Draft Release
        script: |
          gh release create "v$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | cut -d'+' -f1)" \
            build/app/outputs/apk/github/release/*.apk \
            build/app/outputs/bundle/playstoreRelease/*.aab \
            --draft \
            --title "v$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | cut -d'+' -f1)" \
            --repo "$CM_REPO_SLUG"
    artifacts:
      - build/app/outputs/apk/github/release/*.apk
      - build/app/outputs/bundle/playstoreRelease/*.aab

  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.barnabas.absorb
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
