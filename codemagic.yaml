workflows:
  github-release:
    name: GitHub APK Only
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - absorb_keystore
      groups:
        - github_credentials
      flutter: stable
      java: 17
    scripts:
      - name: Set up key.properties
        script: |
          cat >> $CM_BUILD_DIR/android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Build GitHub APK
        script: flutter build apk --release --flavor github --dart-define=GITHUB_BUILD=true
      - name: Rename APK with version
        script: |
          RAW=$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //')
          APK_SRC=$(ls build/app/outputs/apk/github/release/*.apk | head -1)
          mv "$APK_SRC" "build/app/outputs/apk/github/release/absorb-${RAW}.apk"
      - name: Publish to GitHub Draft Release
        script: |
          VERSION="v$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | cut -d'+' -f1)"
          if gh release view "$VERSION" --repo "$CM_REPO_SLUG" &>/dev/null; then
            gh release upload "$VERSION" \
              build/app/outputs/apk/github/release/*.apk \
              --clobber \
              --repo "$CM_REPO_SLUG"
          else
            gh release create "$VERSION" \
              build/app/outputs/apk/github/release/*.apk \
              --draft \
              --title "$VERSION" \
              --repo "$CM_REPO_SLUG"
          fi
    artifacts:
      - build/app/outputs/apk/github/release/*.apk

  android-release:
    name: Android Release (GitHub + Play Store)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - absorb_keystore
      groups:
        - github_credentials
      flutter: stable
      java: 17
    scripts:
      - name: Set up key.properties
        script: |
          cat >> $CM_BUILD_DIR/android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Build GitHub APK
        script: flutter build apk --release --flavor github --dart-define=GITHUB_BUILD=true
      - name: Build Play Store AAB
        script: flutter build appbundle --release --flavor playstore --dart-define=PLAYSTORE_BUILD=true
      - name: Rename APK and AAB with version
        script: |
          RAW=$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //')
          APK_SRC=$(ls build/app/outputs/apk/github/release/*.apk | head -1)
          mv "$APK_SRC" "build/app/outputs/apk/github/release/absorb-${RAW}.apk"
          AAB_SRC=$(ls build/app/outputs/bundle/playstoreRelease/*.aab | head -1)
          mv "$AAB_SRC" "build/app/outputs/bundle/playstoreRelease/absorb-${RAW}.aab"
      - name: Publish to GitHub Draft Release
        script: |
          VERSION="v$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | cut -d'+' -f1)"
          if gh release view "$VERSION" --repo "$CM_REPO_SLUG" &>/dev/null; then
            gh release upload "$VERSION" \
              build/app/outputs/apk/github/release/*.apk \
              build/app/outputs/bundle/playstoreRelease/*.aab \
              --clobber \
              --repo "$CM_REPO_SLUG"
          else
            gh release create "$VERSION" \
              build/app/outputs/apk/github/release/*.apk \
              build/app/outputs/bundle/playstoreRelease/*.aab \
              --draft \
              --title "$VERSION" \
              --repo "$CM_REPO_SLUG"
          fi
    artifacts:
      - build/app/outputs/apk/github/release/*.apk
      - build/app/outputs/bundle/playstoreRelease/*.aab

  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Dev Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.barnabas.absorb
      groups:
        - github_credentials
      flutter: stable
      xcode: latest
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
      - name: Rename IPA with version
        script: |
          RAW=$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //')
          IPA_SRC=$(ls build/ios/ipa/*.ipa | head -1)
          mv "$IPA_SRC" "build/ios/ipa/absorb-${RAW}.ipa"
      - name: Publish IPA to GitHub Draft Release
        script: |
          VERSION="v$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | cut -d'+' -f1)"
          if gh release view "$VERSION" --repo "$CM_REPO_SLUG" &>/dev/null; then
            gh release upload "$VERSION" \
              build/ios/ipa/*.ipa \
              --clobber \
              --repo "$CM_REPO_SLUG"
          else
            gh release create "$VERSION" \
              build/ios/ipa/*.ipa \
              --draft \
              --title "$VERSION" \
              --repo "$CM_REPO_SLUG"
          fi
      - name: Publish to TestFlight
        script: |
          # Replaces the auto `publishing.app_store_connect.submit_to_testflight`
          # so we can attach optional TestFlight "What to Test" notes from the
          # BETA_TEST_NOTES env var. Caller (scripts/codemagic-ios.sh) sets the
          # var when triggering; if unset, the build is uploaded without notes.
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          if [ -n "$BETA_TEST_NOTES" ]; then
            echo "Publishing with TestFlight notes ($(printf '%s' "$BETA_TEST_NOTES" | wc -c) chars)"
            app-store-connect publish \
              --path "$IPA_PATH" \
              --testflight \
              --whats-new "$BETA_TEST_NOTES" \
              --locale en-US
          else
            echo "Publishing without TestFlight notes (BETA_TEST_NOTES unset)"
            app-store-connect publish \
              --path "$IPA_PATH" \
              --testflight
          fi
    artifacts:
      - build/ios/ipa/*.ipa

  ios-altstore:
    name: iOS AltStore Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Dev Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.barnabas.absorb
      flutter: stable
      xcode: latest
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa

  all-release:
    name: All Platforms Release (APK + AAB + IPA to GitHub + TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Dev Key
    environment:
      android_signing:
        - absorb_keystore
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.barnabas.absorb
      groups:
        - github_credentials
      flutter: stable
      java: 17
      xcode: latest
    scripts:
      - name: Set up key.properties
        script: |
          cat >> $CM_BUILD_DIR/android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Set up iOS code signing
        script: xcode-project use-profiles
      - name: Build GitHub APK
        script: flutter build apk --release --flavor github --dart-define=GITHUB_BUILD=true
      - name: Build Play Store AAB
        script: flutter build appbundle --release --flavor playstore --dart-define=PLAYSTORE_BUILD=true
      - name: Build iOS IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
      - name: Rename APK, AAB and IPA with version
        script: |
          RAW=$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //')
          APK_SRC=$(ls build/app/outputs/apk/github/release/*.apk | head -1)
          mv "$APK_SRC" "build/app/outputs/apk/github/release/absorb-${RAW}.apk"
          AAB_SRC=$(ls build/app/outputs/bundle/playstoreRelease/*.aab | head -1)
          mv "$AAB_SRC" "build/app/outputs/bundle/playstoreRelease/absorb-${RAW}.aab"
          IPA_SRC=$(ls build/ios/ipa/*.ipa | head -1)
          mv "$IPA_SRC" "build/ios/ipa/absorb-${RAW}.ipa"
      - name: Publish all to GitHub Draft Release
        script: |
          VERSION="v$(grep 'version:' pubspec.yaml | head -1 | sed 's/version: //' | cut -d'+' -f1)"
          if gh release view "$VERSION" --repo "$CM_REPO_SLUG" &>/dev/null; then
            gh release upload "$VERSION" \
              build/app/outputs/apk/github/release/*.apk \
              build/app/outputs/bundle/playstoreRelease/*.aab \
              build/ios/ipa/*.ipa \
              --clobber \
              --repo "$CM_REPO_SLUG"
          else
            gh release create "$VERSION" \
              build/app/outputs/apk/github/release/*.apk \
              build/app/outputs/bundle/playstoreRelease/*.aab \
              build/ios/ipa/*.ipa \
              --draft \
              --title "$VERSION" \
              --repo "$CM_REPO_SLUG"
          fi
    artifacts:
      - build/app/outputs/apk/github/release/*.apk
      - build/app/outputs/bundle/playstoreRelease/*.aab
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
